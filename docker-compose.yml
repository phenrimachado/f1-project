services:
  postgres:
    image: postgres:16-alpine
    container_name: f1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-f1_project}
      POSTGRES_USER: ${DB_USERNAME:-f1_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - f1_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-f1_user} -d ${DB_DATABASE:-f1_project}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: f1_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - f1_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PHP-FPM (o "motor" do Laravel). Nao serve HTTP diretamente, quem faz isso e o nginx abaixo.
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: f1_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - f1_network

  # Nginx serve HTTP e repassa .php pro container "api" via fastcgi (porta 9000).
  nginx:
    image: nginx:1.27-alpine
    container_name: f1_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
      - ./api/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - f1_network

  # Worker das filas (sincronizacao com a OpenF1, processamento assincrono).
  queue-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: f1_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --backoff=5
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - f1_network

  # Executa o Laravel Scheduler a cada minuto (equivalente ao cron do artisan schedule:run).
  scheduler:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: f1_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - f1_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: f1_web
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - API_INTERNAL_URL=http://nginx/api
    env_file:
      - ./web/.env.local
    depends_on:
      - nginx
    networks:
      - f1_network

volumes:
  postgres_data:
  redis_data:
  api_vendor:
  web_node_modules:
  web_next_cache:

networks:
  f1_network:
    driver: bridge
